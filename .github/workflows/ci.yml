name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: test_environment.yml
          environment-name: test
          cache-environment: true

      - name: Install pdm
        run: python -m pip install pdm

      - name: Install lint dependencies
        run: pdm install -G lint

      - name: Run flake8
        run: pdm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    services:
      postgis:
        image: postgis/postgis:12-2.5
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      TRIBS_TEST_DATABASE: postgresql://postgres:mysecretpassword@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-12 g++-12 openmpi-bin libopenmpi-dev

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: test_environment.yml
          environment-name: test
          cache-environment: true

      - name: Install pdm
        run: python -m pip install pdm

      - name: Install project dependencies
        run: pdm install -G:all

      - name: Install tethysext-atcore
        run: pip install --upgrade git+https://github.com/Aquaveo/tethysext-atcore.git@master

      - name: Run pytest
        run: pdm run test
